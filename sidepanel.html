<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Live Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Gemini Live</h1>
            <div id="connection-status" class="status-badge disconnected">Disconnected</div>
        </header>

        <main>
            <div id="chat-container" class="chat-area">
                <!-- Messages will appear here -->
                <div class="system-msg">Press Connect to start</div>
            </div>

            <div class="controls-panel">
                <div class="setting-group">
                    <label for="api-key">Gemini API Key</label>
                    <input type="password" id="api-key" placeholder="Enter API Key...">
                </div>

                <div class="action-buttons">
                    <button id="connect-btn" class="primary-btn">Connect</button>
                    <button id="disconnect-btn" class="secondary-btn" disabled>Disconnect</button>
                </div>

                <div class="media-controls">
                    <button id="mic-btn" class="icon-btn" title="Toggle Microphone" disabled>
                        <span class="icon">🎤</span>
                    </button>
                    <button id="camera-btn" class="icon-btn" title="Toggle Camera" disabled>
                        <span class="icon">📷</span>
                    </button>
                    <button id="screen-btn" class="icon-btn" title="Share Screen" disabled>
                        <span class="icon">🖥️</span>
                    </button>
                </div>

                <div class="input-area">
                    <input type="text" id="chat-input" placeholder="Type a message..." disabled>
                    <button id="send-btn" disabled>Send</button>
                </div>
            </div>
            
            <div class="video-preview-container">
                <video id="video-preview" autoplay playsinline muted hidden></video>
                <canvas id="video-canvas" hidden></canvas>
            </div>
        </main>

        <footer>
            <div class="model-info">Model: <span id="model-name">gemini-2.0-flash-exp</span></div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="gemini-live-api.js"></script>
    <script src="media-handlers.js"></script>
    <script src="main.js"></script>
</body>
</html>
